version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env  
    environment:
      - FLASK_ENV=production
      #- DATABASE_URL=postgresql://saarthi:password@db:5432/saarthi_db
      - REDIS_URL=redis://redis:6379/0
    command: gunicorn --worker-class gevent --bind 0.0.0.0:5000 --workers 2  --timeout 5000 "app:create_app()"  
    #command: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 5000 "app:create_app()"
    depends_on:
      db:
        condition: service_healthy  # Changed: Forces web to wait for DB to be READY
      redis:
        condition: service_started

    volumes:
      - ./app:/app/app
    #command: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 run:app

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=saarthi
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=saarthi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: # Added: This checks if the DB is actually awake
      test: ["CMD-SHELL", "pg_isready -U saarthi -d saarthi_db"]
      interval: 5s
      timeout: 5s
      retries: 5  


  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=saarthi
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama 
    environment:
       - OLLAMA_KEEP_ALIVE=-1
       - OLLAMA_NUM_THREADS=6
    cpus: 6.0
    mem_limit: 5120m



volumes:
  postgres_data:
  redis_data:
  mongo_data:
  qdrant_data:
  ollama_data:
