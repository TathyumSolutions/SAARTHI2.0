{% extends "base.html" %}
{% block title %}API Mode - Saarthi{% endblock %}

{% block extra_styles %}
<style>
    .api-mode-panel {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        overflow: hidden;
        height: calc(100vh - 160px);
        min-height: 700px;
        position: relative;
    }

    .api-mode-panel rapi-doc {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
    }
</style>
{% endblock %}

{% block content %}
    <div style="display: flex; flex-direction: column; gap: 16px;">
        <h2 style="color: #fff; margin-bottom: 16px;">API Mode</h2>
        <div class="api-mode-panel">
            <script type="module" src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"></script>
            <rapi-doc
                spec-url="/apispec_1.json"
                theme="dark"
                show-header="false"
                allow-authentication="false"
                render-style="read"
                schema-style="table"
                primary-color="#0078D4"
                bg-color="#1E1E1E"
                text-color="#FFFFFF"
                header-color="#252526"
                nav-bg-color="#252526"
                nav-text-color="#FFFFFF"
                nav-accent-color="#4EC9B0"
                response-area-bg-color="#2D2D30"
                style="width: 100%; height: 100%; --border-color: #3E3E42;"
            ></rapi-doc>
        </div>
    </div>
{% endblock %}
